# Do NOT commit real secrets. Create this at deploy time instead, e.g.:
#   kubectl create secret generic gateway-secrets \
#     --from-literal=jwt-secret=$(openssl rand -hex 32)
#
# This file documents the expected shape only.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
type: Opaque
stringData:
  jwt-secret: "REPLACE_ME_AT_DEPLOY_TIME"
